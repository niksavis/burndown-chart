repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml', '--severity-level', 'medium', '--confidence-level', 'medium']
        # Only scan project source; skip tests, vendor, and generated code
        files: ^(data|callbacks|ui|visualization|app\.py)

  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-jinja
        files: report_assets/.*\.(html|j2|jinja)$
        types_or: [html, jinja]
        args: [--reformat]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.6.2
        files: \.(js|css|json|yml|yaml)$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # Exclude auto-generated lock files and vendor bundles
        exclude: |
          (?x)^(
            requirements.*\.txt|
            package-lock\.json|
            assets/vendor/.*
          )$
