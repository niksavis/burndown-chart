[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
  ".beads",
  ".continue",
  ".venv",
  "build",
  "dist",
  "cache",
  "logs",
  "profiles",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"callbacks/**/*.py" = ["E501"]
"configuration/help_content.py" = ["E501"]
"configuration/settings.py" = ["E501"]
"data/**/*.py" = ["E501"]
"ui/budget_cards/timeline_cards.py" = ["E501"]
"ui/cards/data_cards.py" = ["E501"]
"ui/cards/forecast_cards.py" = ["E501"]
"ui/cards/legacy_status_cards.py" = ["E501"]
"ui/dashboard/activity_quality.py" = ["E501"]
"ui/dashboard/executive_summary.py" = ["E501"]
"ui/dashboard/forecast_analytics.py" = ["E501"]
"ui/dashboard/insights_engine.py" = ["E501"]
"ui/dashboard_cards.py" = ["E501"]
"ui/dashboard_enhanced.py" = ["E501"]
"ui/dora_metrics_dashboard.py" = ["E501"]
"ui/empty_states.py" = ["E501"]
"ui/environment_config_form.py" = ["E501"]
"ui/field_mapping_modal.py" = ["E501"]
"ui/issue_type_config_form.py" = ["E501"]
"ui/layout.py" = ["E501"]
"ui/metric_cards.py" = ["E501"]
"ui/pert_components.py" = ["E501"]
"ui/scope_metrics.py" = ["E501"]
"ui/settings_panel.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.djlint]
profile = "jinja"
indent = 2
max_line_length = 120
format_css = true
format_js = true
ignore = "H006,H013,H021,H031"
extension = "html,j2,jinja"
