[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
  ".beads",
  ".continue",
  ".venv",
  "build",
  "dist",
  "cache",
  "logs",
  "profiles",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"callbacks/**/*.py" = ["E501"]
"configuration/flow_config.py" = ["E501"]
