[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
  ".beads",
  ".continue",
  ".venv",
  "build",
  "dist",
  "cache",
  "logs",
  "profiles",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.lint.per-file-ignores]
"configuration/help_content.py" = ["E501"]
"data/**/*.py" = ["E501"]
"ui/dashboard/activity_quality.py" = ["E501"]
"ui/dashboard/insights_engine.py" = ["E501"]
"ui/empty_states.py" = ["E501"]
"ui/issue_type_config_form.py" = ["E501"]
"ui/metric_cards.py" = ["E501"]
"ui/pert_components.py" = ["E501"]
"ui/scope_metrics.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.djlint]
profile = "jinja"
indent = 2
max_line_length = 120
format_css = true
format_js = true
ignore = "H006,H013,H021,H031"
extension = "html,j2,jinja"
