[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [
  ".beads",
  ".continue",
  ".venv",
  "build",
  "dist",
  "cache",
  "logs",
  "profiles",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.djlint]
profile = "jinja"
indent = 2
max_line_length = 120
format_css = false
format_js = false
# H006/H013: img alt handled by content authors
# H016/H030/H031: title/meta live in report_head.html included partial
# H021: inline styles are intentional for dynamic Jinja2 color values
ignore = "H006,H013,H016,H021,H030,H031"
